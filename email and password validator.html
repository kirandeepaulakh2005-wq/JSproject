<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Interactive feedback form with error highlights</title>
  <link rel="stylesheet" href="validator.css">
</head>
<body>

<div class="container">
    <h2>Email and Password Validator</h2>
    <form autocomplete="off" id="loginform">

    <!-- Email -->
    <div class="form-group">
        <label for="email">Email:</label>
      <input type="text" id="email" placeholder="Enter Email">
      <small class="error" id="emailError">
        Please enter a valid email
      </small>
    </div>

    <!-- Password -->
    <div class="form-group">
        <label for="password">password:</label>
      <input type="password" id="password" placeholder="Enter Password">
      <small class="error" id="passwordError">
        Password must be at least 6 characters
      </small>
    </div>

    <button type="submit">Submit</button>
  </form>

  <div id="resultmessage">
    There are errors.
  </div>
</div>
<script src="form.js"></script>
</body>
</html>
